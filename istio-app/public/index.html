<body>
<header class="topbar">

<script>

    startOnLoad: false,
    theme: 'dark',
    themeVariables: {

      primaryColor: '#1e3a8a',
      primaryTextColor: '#e6ecff',
      primaryBorderColor: '#3b82f6',
      lineColor: '#7dd3fc',
      secondaryColor: '#7c3aed',
